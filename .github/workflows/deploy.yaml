name: Deploy CDK

on:
  workflow_dispatch: #change for production

permisions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.16.0
          cache: pnpm
          cache-dependency-path: infrastructure/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@a20cf827fed7baafaae4bd5a5b13c4e01ec52d16
        with:
          role-to-assume: PLACEHOLDER_ROLE_ARN
          aws-region: us-east-1

      # Placeholder deployment step
      - name: Deploy
        run: pnpm cdk deploy --require-approval never
