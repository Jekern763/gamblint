name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# NEW: We must give the GitHub Action bot permission to write code back to your repo
permissions:
  contents: write

jobs:
  # --- JOB 1: FORMATTING ---
  format:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # This ensures we checkout the actual branch, not a detached state
        ref: ${{ github.head_ref || github.ref_name }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Black
      run: pip install black

    - name: Format code with Black
      # Notice we removed --check so it actually modifies the files
      run: black --fast .

    - name: Commit formatting changes
      # This is an incredibly popular, standard action for auto-committing
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: auto-format code with Black"
        commit_user_name: "github-actions[bot]"
        commit_user_email: "github-actions[bot]@users.noreply.github.com"

  # --- JOB 2: TESTING ---
  test:
    # NEW: This tells the test job to wait until the formatting job is completely done
    needs: format 
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Pull the absolute latest code, including any new formatting commits
        ref: ${{ github.head_ref || github.ref_name }}

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run unit tests with pytest
      run: |
        pytest